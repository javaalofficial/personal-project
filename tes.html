<!DOCTYPE html>
<html>
<head>
    <title>Tes Rotasi Canvas</title>
</head>
<body style="text-align: center; margin-top: 50px;">

    <h2>Demo Rotasi Canvas (Save & Restore)</h2>
    <canvas id="tesCanvas" width="500" height="300" style="border:2px solid black; background: #f0f0f0;"></canvas>

    <script>
        const canvas = document.getElementById('tesCanvas');
        const ctx = canvas.getContext('2d');

        let sudutPutar = 0; // Sudut awalnya 0 derajat

        function draw() {
            // Bersihkan kanvas tiap frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ==========================================
            // 1. KOTAK BIRU (DI LUAR ROTASI)
            // ==========================================
            ctx.fillStyle = 'blue';
            ctx.fillRect(20, 20, 50, 50); // Diam di pojok kiri atas
            ctx.fillStyle = 'black';
            ctx.fillText("Luar save()", 20, 90);

            // ==========================================
            // 2. KOTAK MERAH (YANG DIPUTAR)
            // ==========================================
            let xTengah = canvas.width / 2;
            let yTengah = canvas.height / 2;
            let lebar = 80;
            let tinggi = 80;

            ctx.save(); // MULAILAH MENANDAI POSISI MEJA
           
            // A. Pindah pusat paku ke tengah kanvas (tempat kotak merah)
            ctx.translate(xTengah, yTengah);

            // B. Putar mejanya!
            ctx.rotate(sudutPutar * Math.PI / 180);
             ctx.fillStyle = 'blue';
            ctx.fillRect(20, 20, 50, 50); // Diam di pojok kiri atas
            ctx.fillStyle = 'black';
            ctx.fillText("Luar save()", 20, 90);
            // C. Gambar kotaknya. Ingat, harus ditarik mundur -w/2 dan -h/2
            // ctx.fillStyle = 'red';
            // ctx.fillRect(-lebar / 2, -tinggi / 2, lebar, tinggi);
             ctx.fillStyle = 'blue';
            ctx.fillRect(20, 20, 50, 50); // Diam di pojok kiri atas
            ctx.fillStyle = 'black';
            ctx.fillText("Luar save()", 20, 90);

//             basic() {
//     drawing.save(); // Simpan posisi meja lurus

//     // Geser paku ke tengah pesawat
//     drawing.translate(this.x + this.w / 2, this.y + this.h / 2);

//     // Putar meja sesuai isi variabel this.sudut
//     drawing.rotate(this.sudut * Math.PI / 180);

//     // Gambar pesawat (ingat ditarik mundur setengah lebar/tinggi)
//     drawing.drawImage(this.picture, -this.w / 2, -this.h / 2, this.w, this.h);

//     drawing.restore(); // Balikin meja jadi lurus lagi
// }

            ctx.restore(); // KEMBALIKAN MEJA JADI LURUS!

            // ==========================================
            // 3. KOTAK HIJAU (BUKTI MEJA SUDAH LURUS)
            // ==========================================
            ctx.fillStyle = 'green';
            ctx.fillRect(430, 20, 50, 50); // Diam di pojok kanan atas
            ctx.fillStyle = 'black';
            ctx.fillText("Luar restore()", 420, 90);


            // Tambah sudutnya biar kotaknya muter terus seperti kipas
            sudutPutar += 2; 
            
            // Panggil fungsi ini berulang-ulang
            requestAnimationFrame(draw); 
        }

        // Mulai animasi
        draw();
    </script>

</body>
</html>
